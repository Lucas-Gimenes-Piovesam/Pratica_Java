<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adivinhe o Número</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
    }
    #resultado {
        font-size: 1.2em;
        margin-bottom: 20px;
    }
</style>
</head>
<body>
<h1>Adivinhe o Número!</h1>
<p>Eu escolhi um número entre 1 e 100. Tente adivinhar qual é!</p>
<p>Digite seu palpite abaixo:</p>
<input type="number" id="palpite" min="1" max="100">
<button onclick="verificarPalpite()">Enviar palpite</button>
<p id="resultado"></p>

<script>
    // Gerar um número aleatório entre 1 e 100
    const numeroAleatorio = Math.floor(Math.random() * 100) + 1;

    function verificarPalpite() {
        // Obter o palpite do usuário
        const palpite = parseInt(document.getElementById("palpite").value);
        
        // Verificar se o palpite está correto
        if (palpite === numeroAleatorio) {
            exibirResultado("Parabéns! Você acertou! Sinta-se a vontade para jogar novamente.");
        } else if (palpite < numeroAleatorio) {
            exibirResultado("O número é maior. Tente novamente!");
        } else {
            exibirResultado("O número é menor. Tente novamente!");
        }
    }

    function exibirResultado(mensagem) {
        document.getElementById("resultado").innerText = mensagem;
    }
</script>
<p><a href="principal .html" class="link-primary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Voltar para Hub Projetinhos</a></p>
</body>
</html>
